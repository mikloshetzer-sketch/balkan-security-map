name: Poll Scraper Pipeline

on:
  schedule:
    - cron: "0 4 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-aggregate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run poll scraper
        run: |
          python scripts/scrape_polls.py

      - name: Aggregate polls
        run: |
          python scripts/fetch_and_aggregate_party_polls.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update poll data"
            git push
          fi
