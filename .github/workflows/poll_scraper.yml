name: Poll Scraper Pipeline

on:
  schedule:
    # kéthetente vasárnap 04:00 UTC (06:00 Budapest)
    - cron: "0 4 */14 * *"

  workflow_dispatch:  # manuális futtatás is lehessen

jobs:
  scrape-and-aggregate:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo letöltése
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python környezet
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Függőségek
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      # 4. Poll scraping (KÖZÖS RENDSZER)
      - name: Run poll scraper
        run: |
          python scripts/scrape_polls.py

      # 5. Aggregáció (már meglévő scripted)
      - name: Aggregate polls
        run: |
          python scripts/fetch_and_aggregate_party_polls.py

      # 6. Git commit csak ha van változás
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/data/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update poll data"
            git push
          fi
